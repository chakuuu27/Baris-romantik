<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Barış Romantik</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(to top, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: sans-serif;
}

h1 {
  position: absolute;
  font-size: 2em;
  color: white;
  text-align: center;
  z-index: 10;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 1em;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  transition: all 0.3s;
}

button:hover {
  transform: scale(1.2);
  background-color: #fff;
  color: #ff6b81;
}

.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 5s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -10px;
  left: 0;
}

.heart::after {
  left: 10px;
  top: 0;
}

@keyframes float {
  0% { transform: translateY(0) rotate(45deg); opacity: 1; }
  100% { transform: translateY(-600px) rotate(45deg); opacity: 0; }
}
</style>
</head>
<body>
<h1 id="message">Barışalım mı?</h1>
<div>
<button onclick="clickGood()">İyi senden naber</button>
<button onclick="clickNo()">Sanane</button>
</div>

<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.style.animationDuration = 3 + Math.random() * 2 + 's';
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 5000);
}
setInterval(createHeart, 300);

function clickGood() {
  const msg = document.getElementById('message');
  msg.style.fontSize = parseInt(msg.style.fontSize || 32) + 8 + 'px';
  msg.innerText = "Süper! 😊";
}

function clickNo() {
  const msg = document.getElementById('message');
  msg.style.fontSize = parseInt(msg.style.fontSize || 32) + 8 + 'px';
  msg.innerText = "Tamam 😅";
}
</script>
</body>
</html>
