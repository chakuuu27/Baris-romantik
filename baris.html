<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barışalım mı?</title>
<style>
/* Body ve arka plan animasyonu */
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a18cd1);
    background-size: 600% 600%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Başlık */
h1{
    font-size: 28px;
    margin-bottom: 40px;
    text-shadow: 0 0 15px pink;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from {opacity:0; transform:translateY(-20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Butonlar */
button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
    position:relative;
    transition:0.3s;
    box-shadow:0 0 10px rgba(255,255,255,0.5);
}

#yes{
    background: hotpink;
    color:white;
}

#no{
    background: gray;
    color:white;
}

/* Kalpler ve konfeti */
.heart, .confetti{
    position:absolute;
    font-size:24px;
    pointer-events:none;
    animation:rise 1.2s forwards;
}

.heart{
    color:pink;
}

.confetti{
    color:yellow;
}

@keyframes rise{
    0%{opacity:1; transform:translateY(0) rotate(0deg);}
    100%{opacity:0; transform:translateY(-150px) rotate(360deg);}
}
</style>
</head>
<body>

<h1>Seni çok özledim 😢<br>Barışalım mı?</h1>

<button id="yes">❤️ Evet, barışalım</button>
<button id="no">😤 Hala Küsüm</button>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");

// Başlangıç boyut
let yesSize = 18;

// Evet butonu basılınca
yesBtn.onclick = function(){
    yesSize += 3;
    yesBtn.style.fontSize = yesSize + "px";
    spawnHeart(yesBtn);
    spawnConfetti(yesBtn);
}

// Hala Küsüm butonu basılınca
noBtn.onclick = function(){
    const w = window.innerWidth - 120;
    const h = window.innerHeight - 50;
    const x = Math.floor(Math.random()*w);
    const y = Math.floor(Math.random()*h);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    noBtn.style.position = "absolute";

    spawnHeart(noBtn);
    spawnConfetti(noBtn);
}

// Kalp oluştur
function spawnHeart(btn){
    const heart = document.createElement("div");
    heart.className = "heart";
    const rect = btn.getBoundingClientRect();
    heart.style.left = (rect.left + rect.width/2) + "px";
    heart.style.top = (rect.top - 10) + "px";
    heart.innerHTML = "❤️";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1200);
}

// Konfeti oluştur
function spawnConfetti(btn){
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    const rect = btn.getBoundingClientRect();
    confetti.style.left = (rect.left + Math.random()*30) + "px";
    confetti.style.top = (rect.top - 10) + "px";
    confetti.innerHTML = "✨";
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),1200);
}
</script>

</body>
</html>
